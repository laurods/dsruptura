<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DsMini</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header" id="header">
            <div class="logo-section">
                <h1><span class="dot-icon">●</span> DsRuptura</h1>
            </div>
            <div class="support-info">
                Suporte<br><strong>(54) 9957-2366</strong>
            </div>
        </header>
        <section id="taskCode" class="task-card">
            <strong>Código da Tarefa</strong>
            <input type="number"  id="taskCodeInput" class="taskInput" autocomplete="off" required />
            <p id="protocoloTarefa"></p>
            <button id="btTaskSearch" class="btn btn-primary">Buscar</button>
        </section>
        <section id="secBarcodeInput" class="task-card" style="display: none;">
            <div class="product-item">
                <div class="product-info">
                    <p id="txtScan"></p>
                    <h4 id="lastProduct"></h4>
                    <p id="msg"></p>                    
                </div>                   
            </div>
            <input type="text" inputmode="none" class="barcodeInput" id="barcodeInput" autocomplete="off" required style="display: none;" />
            
        </section>
        <div id="content" style="display: none;">
            <section class="chart-section">
                <div class="chart-container">
                    <div id="donut-chart" class="donut-chart"></div>
                    <div class="chart-label">
                        <span id="percentage" class="percentage"></span>
                        <small class="label-text">RUPTURA</small>
                    </div>
                </div>
            </section>
            
            <section class="stats-grid">
                <div class="stat-item">
                    <label>Estoque</label>
                    <span id="estoque" class="val"></span>
                </div>
                <div class="stat-item">
                    <label>Expostos</label>
                    <span id="expostos" class="val green"></span>
                </div>
                <div class="stat-item">
                    <label>Ruptura</label>
                    <span id="ruptura" class="val red"></span>
                </div>
            </section>
            <section class="task-card">                
                    <button id="bt-save-task" class="btn btn-primary">FINALIZAR</button>            
            </section>            

        </div>
        
        <section id="list-ruptura" class="list-section" style="display: none;">
            <h3>Produtos Ruptura : <span id="qtd-ruptura"></span></h3>
            <div id="item-ruptura" class="item-ruptura"></div>
        </section>
         
    </div>
 
</body>
</html>

<script src="script.js"></script>
