<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Tarefas</title>
    
    <style>
        /* --- Reset & Variáveis de Design --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --modal-bg: rgba(15, 23, 42, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.6rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Lista de Cards --- */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-decoration: none; /* Remove sublinhado de link */
            color: inherit;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
        }

        /* Feedback visual ao tocar no Android */
        .task-card:active {
            transform: scale(0.98);
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-id {
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .task-protocol {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .task-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* --- Loader de Carregamento --- */
        .loader {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 20px;
        }

        /* --- Modal de Detalhes (Visualização da Tarefa) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--modal-bg);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end; /* Abre de baixo para cima, estilo folha nativa mobile */
        }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
            border-top: 1px solid var(--border-color);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .detail-group {
            margin-bottom: 15px;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1rem;
            color: var(--text-primary);
        }

        /* Exibição formatada dos itens convertidos do CSV */
        .json-preview {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-family: monospace;
            overflow-x: auto;
            color: #38bdf8;
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Suas Tarefas</h1>
            <p>Toque em uma tarefa para ver os detalhes</p>
        </div>

        <!-- Onde os cards serão injetados -->
        <div id="loader" class="loader">Carregando tarefas...</div>
        <div class="task-list" id="taskList"></div>
    </div>

    <!-- Modal para exibição de detalhes da tarefa -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <span class="task-id" id="modalTaskId">ID: --</span>
                    <h2 style="margin-top: 8px; font-size: 1.3rem;" id="modalTaskTitle">Título da Tarefa</h2>
                </div>
                <button class="close-btn" id="closeModal">Fechar</button>
            </div>

            <div class="detail-group">
                <div class="detail-label">Protocolo</div>
                <div class="detail-value" id="modalTaskProtocol" style="font-family: monospace;">---------</div>
            </div>

            <div class="detail-group">
                <div class="detail-label">Dados do CSV Vinculado</div>
                <!-- Exibe os dados convertidos de forma limpa -->
                <pre class="json-preview" id="modalTaskJson">[]</pre>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://mariadb-api.rbpezf.easypanel.host/api/tarefas/pendentes';
        const taskList = document.getElementById('taskList');
        const loader = document.getElementById('loader');
        const modal = document.getElementById('taskModal');

        // 1. CARREGAR TODAS AS TAREFAS AO ABRIR A PÁGINA
        async function carregarTarefas() {
            try {
                // OBSERVAÇÃO: Ajuste esta rota caso sua API de listagem geral possua outra URL (ex: sem o /:id)
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Erro ao buscar lista.');
                
                const tarefas = await response.json();
                loader.style.display = 'none';
                taskList.innerHTML = '';

                if(tarefas.length === 0) {
                    taskList.innerHTML = '<div class="loader">Nenhuma tarefa encontrada.</div>';
                    return;
                }

                // Cria os links em formato de cards na tela
                tarefas.forEach(tarefa => {
                    const card = document.createElement('a');
                    card.className = 'task-card';
                    card.href = '#'; // Previne navegação real do link
                    
                    // Evento de clique para buscar pelo ID específico
                    card.addEventListener('click', (e) => {
                        e.preventDefault();
                        buscarTarefaPorId(tarefa.id);
                    });

                    card.innerHTML = `
                        <div class="task-card-header">
                            <span class="task-id">ID: ${tarefa.id}</span>
                            <span class="task-protocol">${tarefa.protocolo}</span>
                        </div>
                        <div class="task-title">${tarefa.descricao}</div>
                    `;
                    taskList.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                loader.textContent = 'Erro ao carregar dados do banco de dados.';
            }
        }

        // 2. BUSCAR TAREFA ESPECÍFICA POR ID AO CLICAR
        async function buscarTarefaPorId(id) {
            try {
                // Dispara o GET /api/tarefa/:id criado anteriormente
                const response = await fetch(`${API_URL}/${id}`);
                if (!response.ok) throw new Error('Tarefa não encontrada.');

                const tarefa = await response.json();

                // Alimenta os campos do Modal com os dados retornados
                document.getElementById('modalTaskId').textContent = `ID: ${tarefa.id}`;
                document.getElementById('modalTaskTitle').textContent = tarefa.descricao;
                document.getElementById('modalTaskProtocol').textContent = tarefa.protocolo;
                
                // Formata o JSON dos produtos para exibição elegante no modal
                document.getElementById('modalTaskJson').textContent = JSON.stringify(tarefa.produtos_data, null, 2);

                // Abre o Modal com efeito elegante
                modal.style.display = 'flex';

            } catch (error) {
                alert('Erro ao buscar detalhes da tarefa: ' + error.message);
            }
        }

        // Fechar Modal
        document.getElementById('closeModal').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Fecha se clicar fora da folha de conteúdo
        modal.addEventListener('click', (e) => {
            if(e.target === modal) modal.style.display = 'none';
        });

        // Inicia a execução ao abrir a tela
        carregarTarefas();
    </script>
</body>
</html>
