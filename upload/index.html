<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Criador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <p>Nome da Tarefa</p>
            <input type="text" id="tarefa" class="taskInput">
        </div>

        <label for="csvFile" class="upload-card" id="dropzone">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                </svg>
            </div>
            <span>Selecione o arquivo</span>
            <small>Apenas arquivos .csv</small>
            <span id="file-name"></span>
        </label>
        
        <input type="file" id="csvFile" accept=".csv">
        
    </div>
        <button class="btn btn-primary" id="btn-upload">Enviar</button>
</body>
</html>

<script src="script.js"></script>
