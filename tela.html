<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DsRuptura - Dashboard Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tela.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo-section">
            <h1><span class="dot-icon">●</span> DsRuptura</h1>
        </div>
        <div class="support-info">
            Suporte<br><strong>(54) 9957-2366</strong>
        </div>
    </header>
    <section id='task-section' class="task-section">
        <h3>Tarefas Disponiveis</h3>
        <div class="task-item">            
            <div id='task-info' class="task-info">
            </div>
        </div>
    </section>
    <section id="task-card" class="task-card">
        <span class="badge">EM ANDAMENTO</span>
        <div id="task-content" class="task-content">
            <h2 id="nomeTarefa"></h2>
            <p id="protocoloTarefa"></p>
        </div>
    </section>
    <section id='barcode-section' class="barcode-section">
        <h3>Coleta</h3>
        <form id="barcodeForm">
            <input type="number" autofocus  id="barcode" autocomplete="off" required placeholder="Codigo de barras" />
        </form>
        <p id="msg"></p>
    </section>   

    <div id="content"> 
        <section class="chart-section">
            <div class="chart-container">
                <div id="donut-chart" class="donut-chart"></div>
                <div class="chart-label">
                    <span id="percentage" class="percentage"></span>
                    <small class="label-text">RUPTURA</small>
                </div>
            </div>
        </section>
    
        <section class="stats-grid">
            <div class="stat-item">
                <label>Estoque</label>
                <span id="estoque" class="val"></span>
            </div>
            <div class="stat-item">
                <label>Expostos</label>
                <span id="expostos" class="val green"></span>
            </div>
            <div class="stat-item">
                <label>Ruptura</label>
                <span id="ruptura" class="val red"></span>
            </div>
        </section>
    
        <section class="list-section">
            <h3>Último Item Bipado</h3>
            <div class="product-item">
                <div class="icon-box">📦</div>
                <div class="product-info">
                    <h4>CHINELO HAVAIANAS SLIM GLOSS PRETO</h4>
                    <p>7895265145282</p>
                </div>
            </div>
        </section>
    
        <footer class="actions">
            <button class="btn btn-primary">💾 SALVAR RELATÓRIO</button>
            <button class="btn btn-danger">🗑️ LIMPAR</button>
        </footer>
    </div>
    
</div>

</body>
</html>

<script type="module" src="tela.js"></script>
